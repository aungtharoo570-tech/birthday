<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
margin-top:40%;
font-size:40px;
color:pink;
}

.heart{
font-size:60px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<h1>Happy Birthday</h1>
<div class="heart">❤️</div>

<p>Wishing you happiness and love.</p>

</body>
</html>
