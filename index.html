<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family: "Segoe UI", sans-serif;
background:linear-gradient(180deg,#ffb6e6,#ff8ad6);
color:#fff;
text-align:center;
overflow-x:hidden;
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(180deg,#ffb6e6,#ff8ad6);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

.neon{
font-size:38px;
letter-spacing:1px;
text-shadow:0 0 10px rgba(255,255,255,0.6);
}

/* GIFT */

.gift{
font-size:80px;
cursor:pointer;
animation:shake 1.2s infinite;
}

@keyframes shake{
0%{transform:rotate(-5deg)}
50%{transform:rotate(5deg)}
100%{transform:rotate(-5deg)}
}

/* MESSAGE */

.message{
max-width:650px;
margin:auto;
line-height:1.8;
padding:20px;
font-size:18px;
color:#fff;
text-shadow:0 0 5px rgba(0,0,0,0.3);
}

#typing{
white-space:pre-line;
}

/* 3D GALLERY */

.gallery{
margin-top:40px;
display:flex;
justify-content:center;
perspective:1200px;
}

.carousel{
width:260px;
height:260px;
position:relative;
transform-style:preserve-3d;
animation:spin 25s linear infinite;
}

.carousel img{
position:absolute;
width:220px;
height:220px;
border-radius:12px;
object-fit:cover;
left:20px;
top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* 3D ROTATE */

@keyframes spin{
0%{transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}

/* HEART */

.heart{
position:fixed;
bottom:-20px;
font-size:18px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* BLOSSOM */

.blossom{
position:fixed;
top:-20px;
font-size:18px;
animation:fall 9s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* VIDEO */

video{
width:90%;
max-width:420px;
margin-top:40px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<!-- INTRO -->

<div id="intro">

<h1 class="neon">Happy Birthday TuTu 🎂</h1>

<div class="gift" onclick="openGift()">🎁</div>

</div>

<!-- MAIN -->

<div id="giftPage" style="display:none">

<h1>Happy Birthday ❤️</h1>

<div class="message">
<p id="typing"></p>
</div>

<!-- 3D PHOTO -->

<div class="gallery">

<div class="carousel" id="carousel">

<img src="IMG_20260306_100008.jpg" onerror="this.style.display='none'">
<img src="IMG_20260307_143345.jpg" onerror="this.style.display='none'">
<img src="IMG_20260307_143417.jpg" onerror="this.style.display='none'">
<img src="IMG_20260307_143433.jpg" onerror="this.style.display='none'">
<img src="IMG_20260307_143622.jpg" onerror="this.style.display='none'">
<img src="IMG_20260307_143700_996.jpg" onerror="this.style.display='none'">
<img src="IMG_20260307_143709_397.jpg" onerror="this.style.display='none'">
<img src="IMG_20260311_143420.jpg" onerror="this.style.display='none'">
<img src="IMG_20260311_143430.jpg" onerror="this.style.display='none'">

</div>

</div>

<!-- VIDEO -->

<video autoplay loop controls>

<source src="lv_7612043031386066184_20260313141159.mp4" type="video/mp4">

</video>

</div>

<script>

/* OPEN GIFT */

function openGift(){

document.getElementById("intro").style.display="none";
document.getElementById("giftPage").style.display="block";

startTyping();
fireworks();

}

/* MESSAGE */

const text=`Happy Birthday, TuTu 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don't matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`;

let i=0;

function startTyping(){

let speed=35;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,speed);

}

}

type();

}

/* HEARTS */

function hearts(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.color="#ff3fa6";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},7000);

}

setInterval(hearts,500);

/* BLOSSOM */

function blossom(){

const b=document.createElement("div");

b.className="blossom";

b.innerHTML="🌸";

b.style.left=Math.random()*100+"vw";

document.body.appendChild(b);

setTimeout(()=>{b.remove();},9000);

}

setInterval(blossom,700);

/* FIREWORK */

function fireworks(){

for(let i=0;i<25;i++){

let conf=document.createElement("div");

conf.innerHTML="🎆";

conf.style.position="fixed";

conf.style.left=Math.random()*100+"vw";

conf.style.top=Math.random()*100+"vh";

conf.style.fontSize="28px";

document.body.appendChild(conf);

setTimeout(()=>{conf.remove();},2000);

}

}

/* 3D ROTATION */

const imgs=document.querySelectorAll("#carousel img");

const angle=360/imgs.length;

imgs.forEach((img,i)=>{

img.style.transform=`rotateY(${angle*i}deg) translateZ(340px)`;

});

</script>

</body>
  </html>
