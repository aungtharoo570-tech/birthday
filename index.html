<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
background:#ffc0e6;
font-family:Arial;
text-align:center;
color:white;
overflow-x:hidden;
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
background:#ffc0e6;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

.gift{
font-size:90px;
cursor:pointer;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:rotate(-5deg)}
50%{transform:rotate(5deg)}
100%{transform:rotate(-5deg)}
}

/* LETTER */

#letter{
display:none;
margin-top:40px;
animation:openLetter 1s;
}

@keyframes openLetter{
from{transform:scale(0)}
to{transform:scale(1)}
}

.message{
max-width:600px;
margin:auto;
line-height:1.7;
font-size:18px;
padding:20px;
}

#typing{
border-right:2px solid white;
white-space:pre-line;
overflow:hidden;
display:inline-block;
}

/* VIDEO */

video{
width:90%;
max-width:400px;
margin-top:30px;
border-radius:10px;
}

/* 3D GLOBE */

.gallery{
margin-top:40px;
display:flex;
justify-content:center;
perspective:1000px;
}

.carousel{
width:260px;
height:260px;
position:relative;
transform-style:preserve-3d;
animation:spin 20s linear infinite;
}

.carousel img{
position:absolute;
width:220px;
height:220px;
border-radius:12px;
object-fit:cover;
left:20px;
top:20px;
}

@keyframes spin{
from{transform:rotateY(0deg)}
to{transform:rotateY(360deg)}
}

/* FLOWERS */

.flower{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh)}
}

/* FIREWORKS */

.fire{
position:fixed;
font-size:28px;
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">

<div class="gift" onclick="openGift()">🎁</div>

<h2>Tap to Open Gift</h2>

</div>

<!-- LETTER -->

<div id="letter">

<h1>Happy Birthday ❤️</h1>

<div class="message">
<p id="typing"></p>
</div>

<!-- VIDEO -->

<video autoplay loop playsinline controls>
<source src="video.mp4" type="video/mp4">
</video>

<!-- 3D PHOTO GLOBE -->

<div class="gallery">

<div class="carousel" id="carousel">

<img src="IMG_20260306_100008.jpg">
<img src="IMG_20260307_143345.jpg">
<img src="IMG_20260307_143417.jpg">
<img src="IMG_20260307_143433.jpg">
<img src="IMG_20260307_143450.jpg">
<img src="IMG_20260307_143622.jpg">
<img src="IMG_20260307_143700_9.jpg">
<img src="IMG_20260307_143709_3.jpg">
<img src="IMG_20260311_143420.jpg">

</div>

</div>

</div>

<script>

/* OPEN GIFT */

function openGift(){

document.getElementById("intro").style.display="none";
document.getElementById("letter").style.display="block";

startTyping();
flowers();
fireworks();

}

/* TYPING MESSAGE */

const text=`Happy Birthday, TuTu. 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don’t matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`;

let i=0;

function startTyping(){

let speed=40;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,speed);
}
}

type();
}

/* FLOWERS */

function flowers(){

setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=3+Math.random()*5+"s";

document.body.appendChild(f);

setTimeout(()=>{f.remove();},8000);

},300);

}

/* FIREWORKS */

function fireworks(){

setInterval(()=>{

for(let i=0;i<15;i++){

let fire=document.createElement("div");

fire.className="fire";

fire.innerHTML="🎆";

fire.style.left=Math.random()*100+"vw";

fire.style.top=Math.random()*100+"vh";

document.body.appendChild(fire);

setTimeout(()=>{fire.remove();},2000);

}

},2000);

}

/* 3D GLOBE POSITION */

const imgs=document.querySelectorAll("#carousel img");

const angle=360/imgs.length;

imgs.forEach((img,i)=>{

img.style.transform=`rotateY(${angle*i}deg) translateZ(350px)`;

});

</script>

</body>
  </html>
