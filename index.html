<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#e6a4b4;
font-family:sans-serif;
text-align:center;
color:white;
}

/* intro */

#intro{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
animation:pulse 1.5s infinite;
cursor:pointer;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* content */

#content{
display:none;
padding:20px;
}

/* message */

#typing{
max-width:320px;
margin:auto;
line-height:1.6;
}

/* globe */

.scene{
width:260px;
height:260px;
margin:40px auto;
perspective:1000px;
display:none;
}

.globe{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
animation:spin 25s linear infinite;
}

.globe img{
position:absolute;
width:120px;
height:150px;
object-fit:cover;
border-radius:12px;
left:70px;
top:40px;
}

.globe img:nth-child(1){transform:rotateY(0deg) translateZ(200px);}
.globe img:nth-child(2){transform:rotateY(40deg) translateZ(200px);}
.globe img:nth-child(3){transform:rotateY(80deg) translateZ(200px);}
.globe img:nth-child(4){transform:rotateY(120deg) translateZ(200px);}
.globe img:nth-child(5){transform:rotateY(160deg) translateZ(200px);}
.globe img:nth-child(6){transform:rotateY(200deg) translateZ(200px);}
.globe img:nth-child(7){transform:rotateY(240deg) translateZ(200px);}
.globe img:nth-child(8){transform:rotateY(280deg) translateZ(200px);}
.globe img:nth-child(9){transform:rotateY(320deg) translateZ(200px);}

@keyframes spin{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

/* video */

#videoSection{
display:none;
margin-top:30px;
}

video{
width:100%;
border-radius:15px;
}

/* flowers */

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div id="intro">
🎁 Tap to Open Gift
</div>

<div id="content">

<h2>Happy Birthday ❤️</h2>

<div id="typing"></div>

<div class="scene" id="photo">
<div class="globe">

<img src="IMG_20260306_100008.jpg">
<img src="IMG_20260307_143345.jpg">
<img src="IMG_20260307_143417.jpg">
<img src="IMG_20260307_143433.jpg">
<img src="IMG_20260307_143450.jpg">
<img src="IMG_20260307_143622.jpg">
<img src="IMG_20260311_135809_740.jpg">
<img src="IMG_20260311_135812_701.jpg">
<img src="IMG_20260311_143420.jpg">

</div>
</div>

<div id="videoSection">

<video controls loop>

<source src="video.mp4" type="video/mp4">

</video>

</div>

</div>

<script>

/* open gift */

document.getElementById("intro").onclick=function(){

this.style.display="none";
document.getElementById("content").style.display="block";

typing();

flowers();

}

/* typing */

let text=`Happy Birthday, TuTu 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don’t matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`;

let i=0;

function typing(){

let el=document.getElementById("typing");

function type(){

if(i<text.length){

el.innerHTML+=text.charAt(i);

i++;

setTimeout(type,40);

}else{

document.getElementById("photo").style.display="block";

setTimeout(function(){

document.getElementById("videoSection").style.display="block";

},1000);

}

}

type();

}

/* flowers */

function flowers(){

setInterval(()=>{

let f=document.createElement("div");

f.className="flower";

f.innerHTML="🌸";

f.style.left=Math.random()*100+"vw";

f.style.animationDuration=3+Math.random()*4+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),7000);

},500);

}

</script>

</body>
</html>
