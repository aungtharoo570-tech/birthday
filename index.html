<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffd6e7);
color:white;
text-align:center;
}

/* tap screen */

#startScreen{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffb6c1;
z-index:10;
cursor:pointer;
}

#startScreen h1{
font-size:30px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* typing text */

#message{
margin-top:40px;
font-size:22px;
width:80%;
margin-left:auto;
margin-right:auto;
}

/* video */

video{
width:80%;
margin-top:20px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

/* hearts rain */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

/* globe */

#globe{
width:200px;
height:200px;
margin:auto;
margin-top:20px;
animation:spin 15s linear infinite;
}

#globe img{
width:100%;
border-radius:50%;
}

@keyframes spin{
0%{transform:rotateY(0)}
100%{transform:rotateY(360deg)}
}

/* love letter */

#letter{
margin-top:30px;
font-size:28px;
animation:openLetter 3s ease forwards;
opacity:0;
}

@keyframes openLetter{
0%{transform:scale(0.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<div id="startScreen" onclick="startSurprise()">
<h1>🎁 Tap To Open Gift</h1>
</div>

<div id="main" style="display:none">

<h1>Happy Birthday 🎂</h1>

<div id="message"></div>

<div id="globe">
<img src="https://i.imgur.com/7yUvePI.jpg">
</div>

<video autoplay loop playsinline controls>
<source src="video.mp4" type="video/mp4">
</video>

<div id="letter">💌 With Love</div>

</div>

<script>

/* typing effect */

let text="Happy Birthday! 🎉 I hope today brings you happiness, love and endless smiles.";
let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}
}

/* hearts rain */

function hearts(){
for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML=Math.random()>0.5?"💗":"🌸";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(heart);
}
}

/* fireworks */

function fireworks(){
setInterval(()=>{
let fire=document.createElement("div");
fire.innerHTML="🎆";
fire.style.position="fixed";
fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";
fire.style.fontSize="30px";
document.body.appendChild(fire);
setTimeout(()=>fire.remove(),1000);
},500);
}

function startSurprise(){

document.getElementById("startScreen").style.display="none";
document.getElementById("main").style.display="block";

type();
hearts();
fireworks();

}

</script>

</body>
</html>
