<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;
background:black;
}

/* VIDEO BACKGROUND */

video.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* DARK OVERLAY */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-2;
}

/* PINK HEART BACKGROUND */

.hearts-bg{
position:fixed;
bottom:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.heart{
position:absolute;
bottom:-20px;
color:#ff4dd2;
font-size:18px;
animation:rise 6s linear infinite;
}

@keyframes rise{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

.introText{
font-size:48px;
text-shadow:0 0 15px white,0 0 25px #ff4dd2;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{opacity:0.5}
to{opacity:1}
}

/* MAIN */

#main{
display:none;
padding-top:70px;
}

/* GIFT */

.gift{
font-size:80px;
cursor:pointer;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:rotate(-6deg)}
50%{transform:rotate(6deg)}
100%{transform:rotate(-6deg)}
}

/* MESSAGE */

.message{
max-width:650px;
margin:auto;
font-size:20px;
line-height:1.7;
padding:20px;
}

#typing{
border-right:2px solid white;
white-space:pre-line;
}

/* 3D PHOTO RING */

.scene{

width:280px;
height:280px;

margin:70px auto;

perspective:1000px;

}

.ring{

width:100%;
height:100%;

position:relative;

transform-style:preserve-3d;

animation:spin 25s linear infinite;

}

.ring img{

position:absolute;

width:200px;
height:200px;

left:40px;
top:40px;

border-radius:14px;

object-fit:cover;

box-shadow:0 0 20px rgba(255,255,255,0.7);

}

@keyframes spin{

from{
transform:rotateY(0deg)
}

to{
transform:rotateY(360deg)
}

}

/* BLOSSOM */

.blossom{

position:fixed;

top:-20px;

font-size:18px;

animation:fall 8s linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-10vh)
}

100%{
transform:translateY(110vh)
}

}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->

<video class="bg" autoplay loop playsinline>

<source src="video.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="hearts-bg" id="hearts"></div>

<!-- INTRO -->

<div id="intro">

<h1 class="introText">Happy Birthday TuTu 🎂</h1>

</div>

<!-- MAIN -->

<div id="main">

<div class="gift" onclick="openGift()">🎁</div>

<h1>Happy Birthday ❤️</h1>

<div class="message">

<p id="typing"></p>

</div>

<!-- 3D PHOTOS -->

<div class="scene">

<div class="ring" id="ring">

<img src="IMG_20260306_100008.jpg">
<img src="IMG_20260307_143345.jpg">
<img src="IMG_20260307_143417.jpg">
<img src="IMG_20260307_143433.jpg">
<img src="IMG_20260307_143450.jpg">
<img src="IMG_20260307_143622.jpg">
<img src="IMG_20260307_143700_996.jpg">
<img src="IMG_20260307_143709_397.jpg">
<img src="IMG_20260311_143420.jpg">

</div>

</div>

</div>

<script>

/* INTRO 3 SEC */

setTimeout(()=>{

document.getElementById("intro").style.display="none"

document.getElementById("main").style.display="block"

},3000)

/* PINK HEARTS */

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(10+Math.random()*20)+"px"

document.getElementById("hearts").appendChild(heart)

setTimeout(()=>{

heart.remove()

},6000)

}

setInterval(createHeart,200)

/* BLOSSOM */

function blossom(){

let b=document.createElement("div")

b.className="blossom"

b.innerHTML="🌸"

b.style.left=Math.random()*100+"vw"

document.body.appendChild(b)

setTimeout(()=>{

b.remove()

},8000)

}

setInterval(blossom,700)

/* FIREWORKS */

function fireworks(){

for(let i=0;i<30;i++){

let f=document.createElement("div")

f.innerHTML="🎆"

f.style.position="fixed"

f.style.left=Math.random()*100+"vw"

f.style.top=Math.random()*100+"vh"

f.style.fontSize="28px"

document.body.appendChild(f)

setTimeout(()=>{

f.remove()

},2000)

}

}

/* GIFT */

function openGift(){

startTyping()

fireworks()

}

/* TYPING */

const text=`Happy Birthday, TuTu 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don't matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice.`

let i=0

function startTyping(){

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i)

i++

setTimeout(type,40)

}

}

type()

}

/* 3D PHOTO POSITION */

const imgs=document.querySelectorAll("#ring img")

const angle=360/imgs.length

imgs.forEach((img,i)=>{

img.style.transform=`rotateY(${angle*i}deg) translateZ(350px)`

})

</script>

</body>
</html>
