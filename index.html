<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f6b6d8;
color:white;
text-align:center;
overflow-x:hidden;
}

/* intro */

#intro{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* content */

#content{
display:none;
padding:20px;
}

/* typing message */

#typing{
max-width:330px;
margin:auto;
line-height:1.7;
font-size:17px;
}

/* photo globe */

.scene{
width:260px;
height:260px;
margin:40px auto;
perspective:1000px;
display:none;
}

.globe{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
animation:spin 25s linear infinite;
}

.globe img{
position:absolute;
width:120px;
height:160px;
object-fit:cover;
border-radius:12px;
left:70px;
top:40px;
box-shadow:0 0 12px rgba(255,255,255,0.4);
}

.globe img:nth-child(1){transform:rotateY(0deg) translateZ(200px);}
.globe img:nth-child(2){transform:rotateY(40deg) translateZ(200px);}
.globe img:nth-child(3){transform:rotateY(80deg) translateZ(200px);}
.globe img:nth-child(4){transform:rotateY(120deg) translateZ(200px);}
.globe img:nth-child(5){transform:rotateY(160deg) translateZ(200px);}
.globe img:nth-child(6){transform:rotateY(200deg) translateZ(200px);}
.globe img:nth-child(7){transform:rotateY(240deg) translateZ(200px);}
.globe img:nth-child(8){transform:rotateY(280deg) translateZ(200px);}
.globe img:nth-child(9){transform:rotateY(320deg) translateZ(200px);}

@keyframes spin{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

/* video */

#videoBox{
display:none;
opacity:0;
transition:opacity 1.5s;
margin-top:25px;
}

video{
width:300px;
border-radius:12px;
}

/* flower rain */

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div id="intro">🎁 Tap to Open Gift</div>

<div id="content">

<h2>Happy Birthday ❤️</h2>

<div id="typing"></div>

<div class="scene" id="photo">
<div class="globe">

<img src="IMG_20260306_100008.jpg">
<img src="IMG_20260307_143345.jpg">
<img src="IMG_20260307_143417.jpg">
<img src="IMG_20260307_143433.jpg">
<img src="IMG_20260307_143450.jpg">
<img src="IMG_20260307_143622.jpg">
<img src="IMG_20260311_135809_740.jpg">
<img src="IMG_20260311_135812_701.jpg">
<img src="IMG_20260311_143420.jpg">

</div>
</div>

<div id="videoBox">

<video controls loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

</div>

</div>

<script>

/* intro click */

document.getElementById("intro").onclick=function(){

this.style.display="none";
document.getElementById("content").style.display="block";

startTyping();
flowers();

}

/* typing */

const text=`Happy Birthday, TuTu. 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don't matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`;

let i=0;

function startTyping(){

let el=document.getElementById("typing");

function type(){

if(i<text.length){

el.innerHTML+=text.charAt(i);
i++;

setTimeout(type,40);

}else{

document.getElementById("photo").style.display="block";

/* 3 sec later show video */

setTimeout(function(){

let v=document.getElementById("videoBox");
v.style.display="block";

setTimeout(()=>{v.style.opacity=1;},50);

},3000);

}

}

type();

}

/* flower rain */

function flowers(){

setInterval(()=>{

let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=4+Math.random()*3+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),7000);

},500);

}

</script>

</body>
  </html>
