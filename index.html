<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
background:black;
overflow:hidden;
}

/* VIDEO */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* TAP SCREEN */

#startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

.tapText{
font-size:32px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{opacity:0.4}

50%{opacity:1}

100%{opacity:0.4}

}

/* HEART */

.heart{
position:fixed;
bottom:-20px;
color:#ff4dd2;
font-size:20px;
animation:rise 6s linear infinite;
}

@keyframes rise{

0%{transform:translateY(0)}

100%{transform:translateY(-110vh)}

}

/* MAIN */

#main{
display:none;
padding-top:70px;
}

/* GIFT */

.gift{
font-size:80px;
}

/* MESSAGE */

.message{
max-width:650px;
margin:auto;
font-size:20px;
line-height:1.7;
padding:20px;
}

/* 3D PHOTOS */

.scene{

width:280px;
height:280px;
margin:70px auto;
perspective:1000px;

}

.ring{

width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
animation:spin 25s linear infinite;

}

.ring img{

position:absolute;

width:200px;
height:200px;

left:40px;
top:40px;

border-radius:14px;

object-fit:cover;

box-shadow:0 0 20px rgba(255,255,255,0.7);

}

@keyframes spin{

from{transform:rotateY(0)}

to{transform:rotateY(360deg)}

}

</style>
</head>

<body>

<!-- VIDEO -->

<video id="bgVideo" loop playsinline>

<source src="video.mp4" type="video/mp4">

</video>

<!-- TAP SCREEN -->

<div id="startScreen">

<div class="tapText">Tap To Open 🎁</div>

</div>

<!-- MAIN -->

<div id="main">

<div class="gift">🎁</div>

<h1>Happy Birthday ❤️</h1>

<div class="message">

<p id="typing"></p>

</div>

<div class="scene">

<div class="ring" id="ring">

<img src="IMG_20260306_100008.jpg">
<img src="IMG_20260307_143345.jpg">
<img src="IMG_20260307_143417.jpg">
<img src="IMG_20260307_143433.jpg">
<img src="IMG_20260307_143450.jpg">
<img src="IMG_20260307_143622.jpg">
<img src="IMG_20260307_143700_996.jpg">
<img src="IMG_20260307_143709_397.jpg">
<img src="IMG_20260311_143420.jpg">

</div>

</div>

</div>

<script>

/* START BUTTON */

document.getElementById("startScreen").onclick=function(){

document.getElementById("startScreen").style.display="none"

document.getElementById("main").style.display="block"

const video=document.getElementById("bgVideo")

video.play()

video.muted=false

}

/* HEART EFFECT */

function heart(){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤"

h.style.left=Math.random()*100+"vw"

document.body.appendChild(h)

setTimeout(()=>{

h.remove()

},6000)

}

setInterval(heart,300)

/* TYPING */

const text=`Happy Birthday, TuTu 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don't matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice.`

let i=0

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i)

i++

setTimeout(type,40)

}

}

type()

/* 3D PHOTO */

const imgs=document.querySelectorAll("#ring img")

const angle=360/imgs.length

imgs.forEach((img,i)=>{

img.style.transform=`rotateY(${angle*i}deg) translateZ(350px)`

})

</script>

</body>
</html>
