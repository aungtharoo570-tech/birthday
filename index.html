<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family: 'Segoe UI',sans-serif;
background:#f7b6d2;
overflow-x:hidden;
text-align:center;
color:white;
}

/* tap intro */

#intro{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

/* main content */

#content{
display:none;
padding:20px;
}

/* typing message */

.message{
max-width:320px;
margin:auto;
line-height:1.7;
}

/* video */

video{
width:90%;
max-width:420px;
border-radius:15px;
margin:30px auto;
display:block;
}

/* globe */

.scene{
width:260px;
height:260px;
margin:60px auto;
perspective:1000px;
position:relative;
}

.globe{
width:100%;
height:100%;
position:absolute;
transform-style:preserve-3d;
animation:rotate 25s linear infinite;
}

.globe img{
position:absolute;
width:120px;
height:160px;
object-fit:cover;
border-radius:12px;
left:70px;
top:40px;
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* positions */

.globe img:nth-child(1){transform:rotateY(0deg) translateZ(200px);}
.globe img:nth-child(2){transform:rotateY(40deg) translateZ(200px);}
.globe img:nth-child(3){transform:rotateY(80deg) translateZ(200px);}
.globe img:nth-child(4){transform:rotateY(120deg) translateZ(200px);}
.globe img:nth-child(5){transform:rotateY(160deg) translateZ(200px);}
.globe img:nth-child(6){transform:rotateY(200deg) translateZ(200px);}
.globe img:nth-child(7){transform:rotateY(240deg) translateZ(200px);}
.globe img:nth-child(8){transform:rotateY(280deg) translateZ(200px);}
.globe img:nth-child(9){transform:rotateY(320deg) translateZ(200px);}

@keyframes rotate{
from{transform:rotateY(0deg);}
to{transform:rotateY(360deg);}
}

/* glow */

.scene::after{
content:"";
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
width:200px;
height:40px;
background:radial-gradient(pink,transparent);
filter:blur(10px);
}

/* flowers */

.flower{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* fireworks */

.firework{
position:fixed;
font-size:24px;
animation:boom 1s ease-out forwards;
}

@keyframes boom{
0%{opacity:1;transform:scale(0);}
100%{opacity:0;transform:scale(4);}
}

</style>
</head>

<body>

<div id="intro">
🎁 Tap to Open Gift
</div>

<div id="content">

<h2>Happy Birthday ❤️</h2>

<div class="message" id="typing"></div>

<video controls loop>
<source src="video.mp4" type="video/mp4">
</video>

<div class="scene">
<div class="globe">

<img src="IMG_20260306_100008.jpg">
<img src="IMG_20260307_143345.jpg">
<img src="IMG_20260307_143417.jpg">
<img src="IMG_20260307_143433.jpg">
<img src="IMG_20260307_143450.jpg">
<img src="IMG_20260307_143622.jpg">
<img src="IMG_20260311_135809_740.jpg">
<img src="IMG_20260311_135812_701.jpg">
<img src="IMG_20260311_143420.jpg">

</div>
</div>

</div>

<script>

/* open gift */

document.getElementById("intro").onclick=function(){
document.getElementById("intro").style.display="none";
document.getElementById("content").style.display="block";
startTyping();
createFlowers();
fireworksLoop();
}

/* typing message */

const text=`Happy Birthday, TuTu. 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don’t matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`;

let i=0;

function startTyping(){
const el=document.getElementById("typing");

function type(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}

type();
}

/* flowers rain */

function createFlowers(){
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=3+Math.random()*4+"s";
document.body.appendChild(f);

setTimeout(()=>f.remove(),7000);

},500);
}

/* fireworks */

function fireworksLoop(){

setInterval(()=>{

let f=document.createElement("div");
f.className="firework";
f.innerHTML="🎆";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

},1200);

}

</script>

</body>
</html>
