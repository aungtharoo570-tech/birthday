<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:cursive;
background:black;
color:white;
text-align:center;
}

/* VIDEO BACKGROUND */

#bgVideo{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(40%);
}

/* TAP SCREEN */

#tap{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

/* GIFT BOX */

#gift{
font-size:70px;
display:none;
margin-top:120px;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0)}
}

/* MESSAGE */

#message{
display:none;
margin-top:30px;
font-size:18px;
line-height:30px;
padding:20px;
}

/* HEARTS */

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

/* PHOTO GLOBE */

#globe{
position:absolute;
top:65%;
left:50%;
transform-style:preserve-3d;
transform:translateX(-50%);
animation:spin 20s linear infinite;
}

#globe img{
position:absolute;
width:110px;
height:110px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

@keyframes spin{
0%{transform:translateX(-50%) rotateY(0deg)}
100%{transform:translateX(-50%) rotateY(360deg)}
}

/* FIREWORK */

.fire{
position:fixed;
font-size:30px;
animation:boom 2s linear;
}

@keyframes boom{
0%{transform:scale(0)}
100%{transform:scale(2);opacity:0}
}

</style>
</head>

<body>

<!-- VIDEO -->

<video id="bgVideo" loop playsinline>
<source src="lv_7612043031386066184_20260313141159.mp4" type="video/mp4">
</video>

<!-- TAP -->

<div id="tap" onclick="start()">Tap To Open 🎁</div>

<!-- GIFT -->

<div id="gift" onclick="openGift()">🎁</div>

<!-- MESSAGE -->

<div id="message">

<h2>Happy Birthday ❤️</h2>

<p id="text"></p>

</div>

<!-- PHOTO GLOBE -->

<div id="globe">

<img src="IMG_20260306_100008.jpg" style="transform:rotateY(0deg) translateZ(250px)">
<img src="IMG_20260307_143345.jpg" style="transform:rotateY(60deg) translateZ(250px)">
<img src="IMG_20260307_143417.jpg" style="transform:rotateY(120deg) translateZ(250px)">
<img src="IMG_20260307_143433.jpg" style="transform:rotateY(180deg) translateZ(250px)">
<img src="IMG_20260307_143450.jpg" style="transform:rotateY(240deg) translateZ(250px)">
<img src="IMG_20260311_143420.jpg" style="transform:rotateY(300deg) translateZ(250px)">

</div>

<script>

/* TAP */

function start(){

document.getElementById("tap").style.display="none";
document.getElementById("gift").style.display="block";

let v=document.getElementById("bgVideo");
v.muted=false;
v.play();

}

/* OPEN GIFT */

function openGift(){

document.getElementById("gift").style.display="none";
document.getElementById("message").style.display="block";

typing();
fireworks();
hearts();

}

/* TYPING LETTER */

let msg=`Happy Birthday, TuTu 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don't matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`;

let i=0;

function typing(){

if(i<msg.length){

document.getElementById("text").innerHTML+=msg.charAt(i);
i++;

setTimeout(typing,40);

}

}

/* HEARTS */

function hearts(){

setInterval(()=>{

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>{h.remove()},6000);

},400);

}

/* FIREWORK */

function fireworks(){

setInterval(()=>{

let f=document.createElement("div");
f.className="fire";
f.innerHTML="🎆";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},2000);

},800);

}

</script>

</body>
  </html>
