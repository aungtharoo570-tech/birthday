<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}

/* VIDEO BACKGROUND */

video.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.introText{
font-size:45px;
text-shadow:0 0 10px white,0 0 20px #ff4dd2,0 0 40px #ff4dd2;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{opacity:0.5}
to{opacity:1}
}

/* MAIN */

#main{
display:none;
padding-top:80px;
}

/* GIFT */

.gift{
font-size:80px;
cursor:pointer;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:rotate(-5deg)}
50%{transform:rotate(5deg)}
100%{transform:rotate(-5deg)}
}

/* MESSAGE */

.message{
max-width:600px;
margin:auto;
font-size:18px;
line-height:1.7;
padding:20px;
}

#typing{
border-right:2px solid white;
white-space:pre-line;
}

/* GLASS PHOTO CARDS */

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:200px;
height:200px;
border-radius:15px;
overflow:hidden;

background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(255,255,255,0.4);

transition:0.5s;
}

.card:hover{
transform:scale(1.1);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* HEART */

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* BLOSSOM */

.blossom{
position:fixed;
top:-20px;
font-size:18px;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->

<video class="bg" autoplay loop playsinline>
<source src="lv_7612043031386066184_20260313141159.mp4" type="video/mp4">
</video>

<!-- INTRO -->

<div id="intro">
<h1 class="introText">Happy Birthday TuTu 🎂</h1>
</div>

<!-- MAIN PAGE -->

<div id="main">

<div class="gift" onclick="openGift()">🎁</div>

<h1>Happy Birthday ❤️</h1>

<div class="message">
<p id="typing"></p>
</div>

<!-- GLASS PHOTO CARDS -->

<div class="gallery">

<div class="card"><img src="IMG_20260306_100008.jpg"></div>
<div class="card"><img src="IMG_20260307_143345.jpg"></div>
<div class="card"><img src="IMG_20260307_143417.jpg"></div>
<div class="card"><img src="IMG_20260307_143433.jpg"></div>
<div class="card"><img src="IMG_20260307_143450.jpg"></div>
<div class="card"><img src="IMG_20260307_143622.jpg"></div>
<div class="card"><img src="IMG_20260307_143700_996.jpg"></div>
<div class="card"><img src="IMG_20260307_143709_397.jpg"></div>
<div class="card"><img src="IMG_20260311_143420.jpg"></div>

</div>

</div>

<script>

/* INTRO 3 SEC */

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
},3000);

/* GIFT */

function openGift(){
startTyping();
fireworks();
}

/* TYPING LETTER */

const text=`Happy Birthday, TuTu. 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don't matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`;

let i=0;

function startTyping(){

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}

type();
}

/* HEARTS */

function hearts(){
const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(hearts,500);

/* BLOSSOM */

function blossom(){

const b=document.createElement("div");

b.className="blossom";
b.innerHTML="🌸";

b.style.left=Math.random()*100+"vw";

document.body.appendChild(b);

setTimeout(()=>{
b.remove();
},8000);

}

setInterval(blossom,700);

/* FIREWORKS */

function fireworks(){

for(let i=0;i<30;i++){

let conf=document.createElement("div");

conf.innerHTML="🎆";

conf.style.position="fixed";
conf.style.left=Math.random()*100+"vw";
conf.style.top=Math.random()*100+"vh";
conf.style.fontSize="30px";

document.body.appendChild(conf);

setTimeout(()=>{
conf.remove();
},2000);

}

}

</script>

</body>
</html>
