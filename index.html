<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
background:#f7b6d8;
font-family:sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
}

/* intro */

#intro{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

#content{
display:none;
padding:20px;
}

/* typing */

#typing{
max-width:320px;
margin:auto;
line-height:1.7;
font-size:17px;
}

/* photo globe */

.scene{
width:250px;
height:250px;
margin:40px auto;
perspective:1000px;
display:none;
}

.globe{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
animation:spin 20s linear infinite;
}

.globe img{
position:absolute;
width:120px;
height:160px;
object-fit:cover;
border-radius:12px;
left:65px;
top:40px;
box-shadow:0 0 12px rgba(255,255,255,0.5);
}

.globe img:nth-child(1){transform:rotateY(0deg) translateZ(200px);}
.globe img:nth-child(2){transform:rotateY(180deg) translateZ(200px);}

@keyframes spin{
from{transform:rotateY(0)}
to{transform:rotateY(360deg)}
}

/* video */

#videoBox{
display:none;
opacity:0;
transition:1.5s;
}

video{
width:300px;
border-radius:12px;
}

/* flower rain */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div id="intro">🎁 Tap to Open Gift</div>

<div id="content">

<h2>Happy Birthday ❤️</h2>

<div id="typing"></div>

<div class="scene" id="photos">

<div class="globe">

<img src="IMG_20260311_135809_740.jpg">
<img src="IMG_20260311_135812_701.jpg">

</div>

</div>

<div id="videoBox">

<video controls loop playsinline>

<source src="lv_7612043031386066184_20260313141159.mp4" type="video/mp4">

</video>

</div>

</div>

<script>

/* intro */

document.getElementById("intro").onclick=function(){

this.style.display="none"

document.getElementById("content").style.display="block"

typing()

flowerRain()

}

/* typing message */

const msg=`Happy Birthday, TuTu 🎂

From today onward,
I wish you endless luck and happiness.

Please always take good care of your health.

May you have the courage
to let go of things that don't matter
and people who are not meant for you.

Spend your time on the things
that truly matter in your life.

And if life allows,
I hope I can always hear
your beautiful singing voice. 🎶`

let i=0

function typing(){

let el=document.getElementById("typing")

function type(){

if(i<msg.length){

el.innerHTML+=msg.charAt(i)

i++

setTimeout(type,40)

}

else{

document.getElementById("photos").style.display="block"

setTimeout(showVideo,3000)

}

}

type()

}

/* video show */

function showVideo(){

let v=document.getElementById("videoBox")

v.style.display="block"

setTimeout(()=>{

v.style.opacity=1

},50)

}

/* flower rain */

function flowerRain(){

setInterval(()=>{

let f=document.createElement("div")

f.className="flower"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=4+Math.random()*3+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),7000)

},500)

}

</script>

</body>
</html>
